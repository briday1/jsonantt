<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 300 240"
     width="300" height="240">
  <!-- background -->
  <rect width="300" height="240" fill="#0d1117"/>
  <!-- bars: left=85.50 right=214.50 (centered in 300px canvas) -->
  <rect x="85.50" y="62.50" width="84" height="22" fill="#4ecdc4" opacity="0.92"/>
  <rect x="106.50" y="93.50" width="78" height="22" fill="#ff6b6b" opacity="0.92"/>
  <rect x="127.50" y="124.50" width="72" height="22" fill="#58a4b0" opacity="0.92"/>
  <rect x="148.50" y="155.50" width="66" height="22" fill="#ffb347" opacity="0.92"/>
  <!-- braces: both 8px from bar group edge, vertically centred at y=120.00 -->
  <text x="77.50" y="120.00"
        font-family="monospace" font-size="52"
        fill="#58a4b0" opacity="0.55"
        text-anchor="end" dominant-baseline="middle">{</text>
  <text x="222.50" y="120.00"
        font-family="monospace" font-size="52"
        fill="#58a4b0" opacity="0.55"
        text-anchor="start" dominant-baseline="middle">}</text>
</svg>
